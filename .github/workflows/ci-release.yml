name: CI and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

# Cancel in-progress runs on new push (branch pushes only; tag runs are never cancelled)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  BINARY_NAME: hydraql
  GO_VERSION: '1.26'
  CODEQL_VERSION: '2.25.6'

jobs:
  # ----------------------------------------------------------------
  # Build and test — all OS × arch combinations
  # Windows arm64 is cross-compiled from the amd64 runner (no native runner exists)
  # ----------------------------------------------------------------
  build-test:
    name: Build and Test (${{ matrix.goos }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: amd64, goos: linux,   goarch: amd64, run_tests: true  }
          - { os: ubuntu-24.04-arm, arch: arm64, goos: linux,   goarch: arm64, run_tests: true  }
          - { os: macos-latest,     arch: arm64, goos: darwin,  goarch: arm64, run_tests: true  }
          - { os: windows-latest,   arch: amd64, goos: windows, goarch: amd64, run_tests: true  }
          - { os: windows-latest,   arch: arm64, goos: windows, goarch: arm64, run_tests: false }

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:" && echo "$unformatted" && exit 1
          fi
        shell: bash

      - name: Vet
        run: go vet ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build
        run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Test
        if: matrix.run_tests
        run: go test ./...
        env:
          GOARCH: ${{ matrix.goarch }}

  # ----------------------------------------------------------------
  # Cross-compile all 6 targets and publish a GitHub Release on tags
  # ----------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile all targets
        run: make build-all VERSION=${GITHUB_REF#refs/tags/v}

      - name: Create SHA-256 checksums
        run: |
          cd dist
          for f in hydraql-*; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Extract release notes from CHANGELOD.MD
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -f CHANGELOD.MD ]; then
            awk "/^## \[$VERSION\]/,/^## \[/{if (/^## \[$VERSION\]/) f=1; else if (/^## \[/) f=0; if (f && !/^## \[$VERSION\]/) print}" CHANGELOD.MD > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "$VERSION" > release_notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: release_notes.md
          files: |
            dist/hydraql-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------
  # Docker: build on every push, push to Docker Hub on tags only
  # ----------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (verify only — branch push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          target: final
          build-args: |
            VERSION=${{ github.ref_name }}
            CODEQL_VERSION=${{ env.CODEQL_VERSION }}
          tags: ${{ env.BINARY_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          target: final
          build-args: |
            VERSION=${{ github.ref_name }}
            CODEQL_VERSION=${{ env.CODEQL_VERSION }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
