name: CI and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

env:
  BINARY_NAME: hydraql
  GO_VERSION: '1.21'
  CODEQL_VERSION: '2.17.6'

jobs:
  # ----------------------------------------------------------------
  # Build and test on all major platforms / architectures
  # ----------------------------------------------------------------
  build-test:
    name: Build and Test (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: windows-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:" && echo "$unformatted" && exit 1
          fi
        shell: bash

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  # ----------------------------------------------------------------
  # Cross-compile all 6 targets and publish a GitHub Release on tags
  # ----------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile all targets
        run: make build-all VERSION=${GITHUB_REF#refs/tags/v}

      - name: Create SHA-256 checksums
        run: |
          cd dist
          for f in hydraql-*; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Extract release notes from CHANGELOD.MD
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -f CHANGELOD.MD ]; then
            awk "/^## \[$VERSION\]/,/^## \[/{if (/^## \[$VERSION\]/) f=1; else if (/^## \[/) f=0; if (f && !/^## \[$VERSION\]/) print}" CHANGELOD.MD > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "$VERSION" > release_notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: release_notes.md
          files: |
            dist/hydraql-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------
  # Build multi-arch Docker image (verify only, no push on PRs/branches)
  # ----------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image (no push)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION=${GITHUB_REF_NAME} \
            --build-arg CODEQL_VERSION=${{ env.CODEQL_VERSION }} \
            -t ${{ env.BINARY_NAME }}:latest \
            --target final \
            .

  # ----------------------------------------------------------------
  # Push Docker image to Docker Hub on release tags only
  # ----------------------------------------------------------------
  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          target: final
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
            CODEQL_VERSION=${{ env.CODEQL_VERSION }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}:${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
